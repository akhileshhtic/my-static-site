<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Matrix</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #58a6ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Hacker Style Loading Terminal */
        #loader-container {
            text-align: left;
            width: 90%;
            max-width: 450px;
            background: #161b22;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .progress-bar {
            color: #238636;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            word-break: break-all;
            min-height: 1.5rem;
        }
        .status-text {
            font-size: 1rem;
            color: #c9d1d9;
            font-weight: bold;
        }
        .status-text::after {
            content: '...';
            animation: blink 1.5s infinite;
        }

        /* Final Page Styles (Hidden by default) */
        #surprise-container {
            display: none;
            text-align: center;
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 500px;
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        h1 {
            font-size: 2.5rem;
            color: #ff79c6;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            color: #f8f8f2;
            line-height: 1.6;
        }
        .highlight {
            color: #50fa7b;
            font-weight: bold;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader-container">
        <div id="bar" class="progress-bar">░░░░░░░░░░░░░░░░░░░░</div>
        <div id="status" class="status-text">Scanning Image</div>
    </div>

    <div id="surprise-container">
        <h1>🎉 Congratulations!</h1>
        <p>You clicked because you were curious.</p>
        <p><span class="highlight">Cybercriminals</span> counted on exactly that.</p>
    </div>

    <script>
        const barElement = document.getElementById('bar');
        const statusElement = document.getElementById('status');
        const loaderContainer = document.getElementById('loader-container');
        const surpriseContainer = document.getElementById('surprise-container');

        const totalBlocks = 20; 
        let currentBlocks = 0;

        // Smooth progression from 0 to 20 blocks
        const progressInterval = setInterval(() => {
            currentBlocks++;
            
            let filled = "█".repeat(currentBlocks);
            let empty = "░".repeat(totalBlocks - currentBlocks);
            barElement.textContent = filled + empty;

            // Change texts dynamically based on blocks loaded
            if (currentBlocks === 7) {
                statusElement.textContent = "Analyzing Data";
            } else if (currentBlocks === 14) {
                statusElement.textContent = "Decrypting";
            }

            // End behavior fixed here
            if (currentBlocks >= totalBlocks) {
                clearInterval(progressInterval);
                
                setTimeout(() => {
                    loaderContainer.style.display = 'none';
                    surpriseContainer.style.display = 'block';
                }, 4000); // 4-second dramatic pause on complete bar before surprise loads
            }
        }, 300);
